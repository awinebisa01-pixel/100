<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Coins UI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* Container */
.app {
  max-width: 420px;
  margin: auto;
  background: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  padding: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 1px solid #eee;
}

/* Username */
.username-box {
  display: flex;
  align-items: center;
  padding: 12px;
}

.logo {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
}

input {
  margin-left: 10px;
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* Coins grid */
.coins {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.coin {
  border: 1px solid #eee;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
}

.coin.active {
  border: 2px solid #ff2d55;
}

.coin span {
  display: block;
  font-size: 14px;
}

/* Payment */
.payment {
  padding: 10px;
  font-size: 12px;
  color: gray;
}

/* Button */
.buy-btn {
  margin: 15px;
  padding: 15px;
  background: red;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
}

/* Popup */
.popup {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 20px;
  display: none;
}

.popup.active {
  display: block;
}

.popup h3 {
  margin: 0;
}

.send-btn {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">Get Coins</div>

  <div class="username-box">
    <div class="logo">♪</div>
    <input type="text" placeholder="Enter username">
  </div>

  <div class="coins">
    <div class="coin active" onclick="selectCoin(this,30)">
      <span>30</span>
      <span>$0.31</span>
    </div>
    <div class="coin" onclick="selectCoin(this,350)">
      <span>350</span>
      <span>$3.65</span>
    </div>
    <div class="coin" onclick="selectCoin(this,700)">
      <span>700</span>
      <span>$7.25</span>
    </div>
    <div class="coin" onclick="selectCoin(this,1400)">
      <span>1400</span>
      <span>$14.49</span>
    </div>
    <div class="coin" onclick="selectCoin(this,3500)">
      <span>3500</span>
      <span>$36.20</span>
    </div>
    <div class="coin" onclick="selectCoin(this,'custom')">
      <span>Custom</span>
    </div>
  </div>

  <div class="payment">
    VISA • MasterCard • PayPal supported
  </div>

  <button class="buy-btn" onclick="openPopup()">Request</button>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h3>Send Coins</h3>
  <p id="selectedAmount">Coins: 30</p>

  <button class="send-btn">Send</button>
</div>

<script>
let selected = 30;

function selectCoin(el, amount) {
  document.querySelectorAll('.coin').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selected = amount;
}

function openPopup() {
  document.getElementById('popup').classList.add('active');
  document.getElementById('selectedAmount').innerText = "Coins: " + selected;
}
</script>

</body>
</html>
