<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Wallet</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/proxima-nova-condensed');
        body { font-family: 'Proxima Nova', sans-serif; overflow: hidden; }
        .keypad-btn { border: 0.5px solid #e5e7eb; height: 60px; font-size: 24px; display: flex; align-items: center; justify-content: center; background: white; }
        .keypad-btn:active { background: #f3f4f6; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [view, setView] = useState('recharge'); // 'recharge', 'custom', 'loading'
            const [selectedCoins, setSelectedCoins] = useState(30);
            const [customAmount, setCustomAmount] = useState('1000000');
            const [username, setUsername] = useState('eddy38270');

            const packages = [
                { coins: 30, price: 0.31 }, { coins: 350, price: 3.65 }, { coins: 700, price: 7.25 },
                { coins: 1400, price: 14.49 }, { coins: 3500, price: 36.20 }
            ];

            const handleKeypad = (val) => {
                if (val === 'delete') setCustomAmount(prev => prev.slice(0, -1));
                else if (val === '000') setCustomAmount(prev => prev + '000');
                else if (customAmount.length < 9) setCustomAmount(prev => prev + val);
            };

            const formatCurrency = (num) => {
                return (parseFloat(num) * 0.0103).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            if (view === 'loading') {
                return (
                    <div className="h-screen w-full flex items-center justify-center bg-black/80 fixed inset-0 z-[100]">
                        <div className="flex flex-col items-center gap-4">
                            <div className="loading-spinner"></div>
                            <p className="text-white font-semibold">Processing payment...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-[450px] mx-auto bg-white min-h-screen relative shadow-2xl overflow-hidden">
                    {/* Header */}
                    <div className="px-4 py-3 flex items-center justify-between border-b border-gray-100 bg-white">
                        <span className="text-xl">✕</span>
                        <h1 className="font-bold text-[17px]">{view === 'custom' ? 'Custom' : 'Wallet'}</h1>
                        <div className="flex gap-4"><span>⋯</span><span>👤</span></div>
                    </div>

                    {/* Main Recharge View */}
                    {view === 'recharge' && (
                        <div className="animate-in fade-in duration-300">
                            <div className="p-4 flex items-center gap-3">
                                <div className="w-10 h-10 bg-black rounded-full flex items-center justify-center">
                                    <svg viewBox="0 0 448 512" className="w-6 h-6 fill-white"><path d="M448 209.91a210.06 210.06 0 0 1-122.77-39.25V349.38A162.55 162.55 0 1 1 185 188.31V278.2a74.62 74.62 0 1 0 52.23 71.18V0l88 0a121.18 121.18 0 0 0 1.86 22.32c7.87 33.32 31.44 60.39 63.06 75.94 11.26 5.54 23.32 8.78 35.85 9.44z"/></svg>
                                </div>
                                <div>
                                    <p className="font-bold">{username}</p>
                                    <p className="text-xs text-gray-400">121 Followers | 15 Following</p>
                                </div>
                            </div>

                            <div className="p-4">
                                <p className="text-gray-500 text-sm font-semibold mb-2">Select Amount</p>
                                <div className="grid grid-cols-3 gap-3">
                                    {packages.map(p => (
                                        <div key={p.coins} onClick={() => setSelectedCoins(p.coins)} className={`p-3 rounded border-2 flex flex-col items-center justify-center ${selectedCoins === p.coins ? 'border-[#FE2C55] bg-red-50' : 'border-gray-100'}`}>
                                            <div className="flex items-center gap-1 font-bold">🪙 {p.coins}</div>
                                            <div className="text-gray-400 text-xs">${p.price}</div>
                                        </div>
                                    ))}
                                    <div onClick={() => setView('custom')} className="p-3 rounded border-2 border-gray-100 flex items-center justify-center font-semibold text-gray-700">Custom</div>
                                </div>
                            </div>
                            
                            <div className="absolute bottom-4 left-4 right-4">
                                <button onClick={() => setView('loading')} className="w-full bg-[#FE2C55] text-white py-3.5 rounded font-bold text-lg">Buy for ${packages.find(p => p.coins === selectedCoins)?.price}</button>
                            </div>
                        </div>
                    )}

                    {/* Custom Keypad View */}
                    {view === 'custom' && (
                        <div className="animate-in slide-in-from-bottom duration-300">
                            <div className="p-6 border-b border-gray-100">
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="text-xs text-gray-500">Coin Amount</span>
                                    <span className="text-gray-400">⌄</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="text-2xl">🪙</span>
                                    <span className="text-3xl font-bold">{customAmount}</span>
                                </div>
                                <p className="text-gray-400 mt-2">${formatCurrency(customAmount)}</p>
                            </div>

                            {/* Custom Keypad */}
                            <div className="grid grid-cols-3 bg-gray-50">
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9, '000', 0, 'delete'].map((k) => (
                                    <div key={k} onClick={() => handleKeypad(k)} className="keypad-btn">
                                        {k === 'delete' ? '⌫' : k}
                                    </div>
                                ))}
                            </div>

                            <div className="p-4 bg-white border-t border-gray-100">
                                <div className="flex justify-between items-center mb-4">
                                    <span className="font-bold">Total</span>
                                    <span className="font-bold text-lg">${formatCurrency(customAmount)}</span>
                                </div>
                                <button onClick={() => setView('loading')} className="w-full bg-[#FE2C55] text-white py-4 rounded font-bold text-lg flex items-center justify-center gap-2">
                                    <svg viewBox="0 0 24 24" className="w-5 h-5 fill-white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                                    Recharge
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
