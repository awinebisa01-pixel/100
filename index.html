<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - Get Coins</title>
    <style>
        :root {
            --tt-red: #FE2C55;
            --tt-cyan: #25F4EE;
            --tt-black: #121212;
            --gray-bg: #F8F8F8;
            --border: #E8E8E8;
        }

        body {
            font-family: 'Proxima Nova', sans-serif, Arial;
            background-color: var(--gray-bg);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: white;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Header & Logo */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .tt-logo {
            width: 32px;
            height: 32px;
        }

        h2 { margin: 0; font-size: 22px; font-weight: 800; }

        .username-field {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #F1F1F2;
            font-size: 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .promo-text {
            color: var(--tt-red);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Coin Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card:active { border-color: var(--tt-red); background: #fff5f6; }

        .card.custom { display: flex; align-items: center; justify-content: center; font-weight: 600; color: #555; }

        .coin-val { font-weight: 700; font-size: 18px; margin-bottom: 4px; }
        .price-val { color: #8a8a8a; font-size: 13px; }

        /* Custom Area */
        #custom-panel {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #777; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }

        /* Pop-up Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        /* Bottom Bar */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .btn {
            background: var(--tt-red);
            color: white;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <svg class="tt-logo" viewBox="0 0 448 512">
            <path fill="black" d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.17h0A122.18,122.18,0,0,0,381,102.39a121.43,121.43,0,0,0,67,20.14Z"/>
        </svg>
        <h2>Get Coins</h2>
    </div>

    <input type="text" class="username-field" placeholder="Enter username">
    <div class="promo-text">Save around 25% with a lower third-party service fee.</div>

    <div class="grid">
        <div class="card" onclick="setAmt(30, 0.31)">
            <div class="coin-val">🪙 30</div>
            <div class="price-val">$0.31</div>
        </div>
        <div class="card" onclick="setAmt(350, 3.65)">
            <div class="coin-val">🪙 350</div>
            <div class="price-val">$3.65</div>
        </div>
        <div class="card" onclick="setAmt(700, 7.25)">
            <div class="coin-val">🪙 700</div>
            <div class="price-val">$7.25</div>
        </div>
        <div class="card custom" onclick="toggleCustom()">Custom</div>
    </div>

    <div id="custom-panel">
        <div class="input-group">
            <label>Friend's Username</label>
            <input type="text" id="friend-user" placeholder="@username">
        </div>
        <div class="input-group">
            <label>Amount of Coins</label>
            <input type="number" id="coin-input" placeholder="0" oninput="calc()">
        </div>
        <button class="btn" style="width: 100%;" onclick="sendAction()">Send to Friend</button>
    </div>
