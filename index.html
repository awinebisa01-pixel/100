<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Recharge</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-shadow { shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-[#F8F8F8]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [selected, setSelected] = useState(30);
            const [customAmount, setCustomAmount] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [username, setUsername] = useState('');

            const packages = [
                { coins: 30, price: 0.31 },
                { coins: 350, price: 3.65 },
                { coins: 700, price: 7.25 },
                { coins: 1400, price: 14.49 },
                { coins: 3500, price: 36.20 }
            ];

            const currentPrice = () => {
                if (typeof selected === 'number') {
                    return packages.find(p => p.coins === selected)?.price || '0.00';
                }
                return (selected * 0.0103).toFixed(2);
            };

            return (
                <div className="max-w-[450px] mx-auto min-h-screen relative flex flex-col bg-[#F8F8F8]">
                    {/* Header */}
                    <div className="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100">
                        <span className="text-2xl">✕</span>
                        <h1 className="font-bold text-[17px]">Get Coins</h1>
                        <div className="flex gap-4 text-xl">
                            <span>⋯</span>
                            <span>👤</span>
                        </div>
                    </div>

                    {/* Username Box */}
                    <div className="bg-white p-4 mb-3 flex items-center gap-3">
                        <div className="w-10 h-10 bg-black rounded-full flex items-center justify-center">
                            <img src="https://www.edigitalagency.com.au/wp-content/uploads/TikTok-logo-PNG-white-stacked.png" className="w-6" />
                        </div>
                        <input 
                            className="flex-1 text-lg outline-none border-b border-gray-200 pb-1" 
                            placeholder="Enter username"
                            value={username}
                            onChange={(e) => setUsername(e.target.value)}
                        />
                    </div>

                    {/* Recharge Section */}
                    <div className="p-4 bg-white flex-1">
                        <p className="text-gray-500 text-sm font-semibold mb-1">Recharge</p>
                        <p className="text-[#FE2C55] text-[13px] mb-4">
                            Save around 25% with a lower third-party service fee. <span className="border border-[#FE2C55] rounded-full px-1 text-[10px]">?</span>
                        </p>

                        <div className="grid grid-cols-3 gap-3">
                            {packages.map(p => (
                                <div 
                                    key={p.coins}
                                    onClick={() => setSelected(p.coins)}
                                    className={`p-3 rounded-lg border-2 flex flex-col items-center justify-center transition-all ${selected === p.coins ? 'border-[#FE2C55] bg-red-50' : 'border-gray-100'}`}
                                >
                                    <div className="flex items-center gap-1 font-bold text-lg">
                                        <span className="text-yellow-400 text-sm">🪙</span> {p.coins}
                                    </div>
                                    <div className="text-gray-400 text-xs">${p.price}</div>
                                </div>
                            ))}
                            <div 
                                onClick={() => setShowModal(true)}
                                className={`p-3 rounded-lg border-2 flex items-center justify-center font-semibold text-gray-700 ${typeof selected === 'string' ? 'border-[#FE2C55] bg-red-50' : 'border-gray-100'}`}
                            >
                                Custom
                            </div>
                        </div>

                        {/* Promo Rows */}
                        <div className="mt-8 space-y-4">
                            <div className="flex items-center justify-between py-2">
                                <div className="flex items-center gap-3">
                                    <span className="text-2xl">👏</span>
                                    <div>
                                        <div className="font-bold text-[15px]">Invite & Get Rewards</div>
                                        <div className="text-gray-400 text-xs">Check out this new feature!</div>
                                    </div>
                                </div>
                                <span className="text-gray-300">❯</span>
                            </div>
                            <div className="flex items-center gap-3 py-2">
                                <div className="w-10 h-10 bg-blue-50 rounded flex items-center justify-center text-blue-500">📱</div>
                                <div>
                                    <div className="font-bold text-[15px]">Add this page to the mobile desktop</div>
                                    <div className="text-gray-400 text-xs">for easy access with just one click</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Floating Overlay (The Akron Card) */}
                    <div className="fixed bottom-32 right-4 w-44 bg-[#262626] rounded-xl overflow-hidden shadow-2xl border border-white/10">
                        <div className="bg-[#3D3D3D] text-[10px] text-white font-bold py-1 px-3 flex justify-between items-center">
                            <span></span>
                            <span className="bg-gray-500 px-1.5 rounded">Request</span>
                        </div>
                        <div className="p-4 flex flex-col items-center">
                            <div className="relative">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" className="w-14 h-14 rounded-full border border-white/20" />
                                <div className="absolute -top-1 -left-2 bg-[#48C8E1] text-[9px] font-bold px-1 rounded flex items-center gap-0.5 border border-white/20">
                                    <span>💎</span> 42
                                </div>
                            </div>
                            <div className="text-white font-bold text-xs mt-2">Akron Sult...</div>
                        </div>
                        <div className="flex justify-end p-2 gap-2 text-white/60">
                            <span className="bg-white/10 p-1 rounded-full text-[10px]">➕</span>
                            <span className="bg-white/10 p-1 rounded-full text-[10px]">🎙️</span>
                        </div>
                    </div>

                    {/* Buy Footer */}
                    <div className="fixed bottom-0 w-full max-w-[450px] bg-white border-t border-gray-100 p-4">
                        <div className="flex gap-2 mb-3 opacity-40 grayscale">
                            <span className="text-xs font-bold border px-1 rounded">VISA</span>
                            <span className="text-xs font-bold border px-1 rounded">MC</span>
                        </div>
                        <button className="w-full bg-[#FE2C55] text-white py-3.5 rounded-md font-bold text-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                            🛡️ Buy for ${currentPrice()}
                        </button>
                    </div>

                    {/* Custom Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end">
                            <div className="bg-white w-full rounded-t-2xl p-6 animate-slide-up">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-bold">Custom amount</h2>
                                    <span onClick={() => setShowModal(false)} className="text-2xl">✕</span>
                                </div>
                                <input 
                                    autoFocus
                                    type="number" 
                                    className="w-full bg-gray-100 p-4 rounded-xl text-2xl font-bold mb-6 outline-none border-2 focus:border-[#FE2C55]" 
                                    placeholder="Min 100"
                                    value={customAmount}
                                    onChange={(e) => setCustomAmount(e.target.value)}
                                />
                                <button 
                                    onClick={() => { setSelected(customAmount); setShowModal(false); }}
                                    className="w-full bg-[#FE2C55] text-white py-4 rounded-xl font-bold text-lg"
                                >
                                    Apply
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
