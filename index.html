<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --tiktok-pink: #FE2C55;
            --tiktok-cyan: #25F4EE;
            --bg-dark: #121212;
        }

        body {
            background-color: #f8f8f8;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Pop-up Container */
        .custom-popup {
            width: 340px;
            background: linear-gradient(135deg, #ff99cc 0%, #a1c4fd 100%);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            color: white;
        }

        .header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* Coin Input Area */
        .coin-display {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .coin-amount {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
        }

        .price-label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 100% Gold Badge */
        .gold-badge {
            display: inline-block;
            margin: 10px 0;
            font-weight: 900;
            font-size: 24px;
            background: linear-gradient(to bottom, #FFE082, #FFC107, #B7950B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        /* Number Pad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .key {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Recharge Button */
        .recharge-btn {
            background-color: var(--tiktok-pink);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="custom-popup">
    <div class="header">Custom Coins</div>
    
    <div class="coin-display">
        <p class="coin-amount">10,000</p>
        <span class="price-label">$103.00</span>
    </div>

    <div class="gold-badge">🪙 100% TikTok</div>

    <div class="keypad">
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key">.</div>
        <div class="key">0</div>
        <div class="key">⌫</div>
    </div>

    <button class="recharge-btn">Recharge</button>
</div>

</body>
</html>
