<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Coins - Recharge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .tiktok-red { background-color: #FE2C55; }
        .tiktok-red-hover:hover { background-color: #e62548; }
        .tiktok-red-text { color: #FE2C55; }
        .tiktok-red-border { border-color: #FE2C55; }
    </style>
</head>
<body class="bg-white">
    <div class="min-h-screen max-w-md mx-auto pb-32">
        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b border-gray-100">
            <div class="w-6"></div>
            <h1 class="text-lg font-semibold text-[#161823]">Get Coins</h1>
            <div class="w-6"></div>
        </div>

        <div class="p-4 space-y-6">
            <!-- Username Input -->
            <div class="flex items-center gap-3 bg-[#F1F1F2] rounded-xl p-3">
                <svg class="w-6 h-6" viewBox="0 0 48 48" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M24 4C12.96 4 4 12.96 4 24s8.96 20 20 20 20-8.96 20-20S35.04 4 24 4zm0 6c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 28c-4.41 0-8.31-2.27-10.57-5.71 3.78-3.78 8.89-5.29 14.57-5.29s10.79 1.51 14.57 5.29C32.31 35.73 28.41 38 24 38z" fill="#161823"/></svg>
                <input type="text" id="recipient" placeholder="Enter username" class="bg-transparent outline-none text-base text-[#161823] placeholder:text-[#8A8A8E] w-full">
            </div>

            <!-- Recharge Banner -->
            <div>
                <p class="text-base font-semibold text-[#161823] mb-1">Recharge</p>
                <p class="text-sm tiktok-red-text">Save around 25% with a lower third-party service fee.</p>
            </div>

            <!-- Coin Grid -->
            <div class="grid grid-cols-3 gap-3" id="coinGrid">
                <!-- Bundles injected by JS -->
            </div>

            <!-- Custom Input Display -->
            <div id="customDisplay" class="hidden">
                <button onclick="openKeypad()" class="w-full bg-[#F1F1F2] rounded-xl p-3 text-left">
                    <div class="flex items-center gap-1">
                        <img src="https://cdn-icons-png.flaticon.com/512/272/272535.png" class="w-5 h-5" alt="coin"/>
                        <span class="font-bold text-lg text-[#161823]" id="customCoinsText">100</span>
                    </div>
                    <p class="text-sm text-[#8A8A8E] mt-1">≈ $<span id="customPriceText">1.04</span></p>
                </button>
            </div>

            <!-- Upsell Cards -->
            <div class="space-y-3 pt-2">
                <div class="flex items-center gap-3 bg-[#F8F8F8] rounded-xl p-4">
                    <i data-lucide="users" class="tiktok-red-text w-6 h-6 flex-shrink-0"></i>
                    <div class="flex-1">
                        <p class="font-semibold text-base text-[#161823]">Invite & Get Rewards</p>
                        <p class="text-sm text-[#8A8A8E]">Check out this new feature!</p>
                    </div>
                    <i data-lucide="chevron-right" class="text-[#8A8A8E] w-5 h-5"></i>
                </div>
                <div class="flex items-center gap-3 bg-[#F8F8F8] rounded-xl p-4">
                    <i data-lucide="smartphone" class="text-[#25F4EE] w-6 h-6 flex-shrink-0"></i>
                    <div class="flex-1">
                        <p class="font-semibold text-base text-[#161823]">Add this page to the mobile desktop</p>
                        <p class="text-sm text-[#8A8A8E]">Easy access with just one click</p>
                    </div>
                    <i data-lucide="chevron-right" class="text-[#8A8A8E] w-5 h-5"></i>
                </div>
            </div>
        </div>

        <!-- Keypad Modal -->
        <div id="keypadModal" class="fixed inset-0 bg-black/40 z-50 hidden items-end">
            <div class="bg-white w-full max-w-md mx-auto rounded-t-2xl p-4">
                <div class="flex justify-between items-center mb-4">
                    <p class="font-semibold text-base">Enter amount</p>
                    <button onclick="closeKeypad()"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="text-center mb-4">
                    <div class="flex items-center justify-center gap-2">
                        <img src="https://cdn-icons-png.flaticon.com/512/272/272535.png" class="w-7 h-7" alt="coin"/>
                        <span class="text-3xl font-bold" id="keypadCoins">100</span>
                    </div>
                    <p class="text-base text-[#8A8A8E]">$<span id="keypadPrice">1.04</span></p>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="keypadInput('1')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">1</button>
                    <button onclick="keypadInput('2')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">2</button>
                    <button onclick="keypadInput('3')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">3</button>
                    <button onclick="keypadInput('4')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">4</button>
                    <button onclick="keypadInput('5')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">5</button>
                    <button onclick="keypadInput('6')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">6</button>
                    <button onclick="keypadInput('7')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">7</button>
                    <button onclick="keypadInput('8')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">8</button>
                    <button onclick="keypadInput('9')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">9</button>
                    <button onclick="keypadInput('clear')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">C</button>
                    <button onclick="keypadInput('0')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">0</button>
                    <button onclick="keypadInput('del')" class="bg-[#F1F1F2] rounded-xl py-4 text-xl font-semibold active:bg-gray-300">⌫</button>
                </div>
                <button onclick="closeKeypad()" class="w-full tiktok-red text-white font-bold rounded-xl py-3 mt-4">Done</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 p-4">
            <div class="flex items-center justify-center gap-2 mb-3">
                <img src="https://js.stripe.com/v3/fingerprinted/img/visa-729c05c240c4bdb47b03ac81d9945bfe.svg" class="h-4" alt="visa"/>
                <img src="https://js.stripe.com/v3/fingerprinted/img/mastercard-4d8844094130711885b5dfa882b4fdc2.svg" class="h-4" alt="mc"/>
            </div>
            <button id="buyBtn" onclick="handlePurchase()" class="w-full tiktok-red tiktok-red-hover disabled:bg-gray-300 text-white font-bold text-base rounded-lg py-3 flex items-center justify-center gap-2">
                <i data-lucide="shield" class="w-5 h-5"></i>
                <span id="buyBtnText">Buy for $3.65</span>
            </button>
        </div>
    </div>

<script>
    // ===== CONFIG: Replace these with your Stripe Payment Links =====
    const STRIPE_LINKS = {
        30: 'https://buy.stripe.com/test_xxx',
        350: 'https://buy.stripe.com/test_yyy',
        700: 'https://buy.stripe.com/test_zzz',
        1400: 'https://buy.stripe.com/test_aaa',
        3500: 'https://buy.stripe.com/test_bbb',
        custom: 'https://buy.stripe.com/test_ccc' // Use Stripe's adjustable quantity link
    };
    // ================================================================

    const COIN_BUNDLES = [
        { id: '1', coins: 30, price: 0.31 },
        { id: '2', coins: 350, price: 3.65 },
        { id: '3', coins: 700, price: 7.25 },
        { id: '4', coins: 1400, price: 14.49 },
        { id: '5', coins: 3500, price: 36.20 },
    ];

    let selectedBundle = COIN_BUNDLES[1];
    let isCustom = false;
    let customCoins = 100;

    function renderGrid() {
        const grid = document.getElementById('coinGrid');
        grid.innerHTML = '';
        
        COIN_BUNDLES.forEach(bundle => {
            const selected = !isCustom && selectedBundle.id === bundle.id;
            grid.innerHTML += `
                <button onclick="selectBundle('${bundle.id}')" class="rounded-xl p-3 border-2 ${selected ? 'tiktok-red-border bg-white' : 'border-transparent bg-[#F8F8F8]'}">
                    <div class="flex items-center justify-center gap-1">
                        <img src="https://cdn-icons-png.flaticon.com/512/272/272535.png" class="w-4 h-4" alt="coin"/>
                        <span class="font-bold text-base text-[#161823]">${bundle.coins}</span>
                    </div>
                    <p class="text-sm text-[#8A8A8E] mt-1">$${bundle.price}</p>
                </button>
            `;
        });
        
        grid.innerHTML += `
            <button onclick="selectCustom()" class="rounded-xl p-3 border-2 flex items-center justify-center ${isCustom ? 'tiktok-red-border bg-white' : 'border-transparent bg-[#F8F8F8]'}">
                <span class="font-semibold text-base text-[#161823]">Custom</span>
            </button>
        `;
        updateBuyButton();
        lucide.createIcons();
    }

    function selectBundle(id) {
        selectedBundle = COIN_BUNDLES.find(b => b.id === id);
        isCustom = false;
        document.getElementById('customDisplay').classList.add('hidden');
        renderGrid();
    }

    function selectCustom() {
        isCustom = true;
        document.getElementById('customDisplay').classList.remove('hidden');
        openKeypad();
        renderGrid();
    }

    function openKeypad() {
        document.getElementById('keypadModal').classList.remove('hidden');
        document.getElementById('keypadModal').classList.add('flex');
        updateKeypadDisplay();
    }

    function closeKeypad() {
        document.getElementById('keypadModal').classList.add('hidden');
        document.getElementById('keypadModal').classList.remove('flex');
        updateCustomDisplay();
        updateBuyButton();
    }

    function keypadInput(val) {
        if (val === 'del') customCoins = Math.floor(customCoins / 10);
        else if (val === 'clear') customCoins = 0;
        else customCoins = Number(String(customCoins) + val);
        updateKeypadDisplay();
    }

    function updateKeypadDisplay() {
        document.getElementById('keypadCoins').textContent = customCoins || 0;
        document.getElementById('keypadPrice').textContent = (customCoins * 0.0104).toFixed(2);
    }

    function updateCustomDisplay() {
        document.getElementById('customCoinsText').textContent = customCoins || 0;
        document.getElementById('customPriceText').textContent = (customCoins * 0.0104).toFixed(2);
    }

    function updateBuyButton() {
        const price = isCustom ? (customCoins * 0.0104).toFixed(2) : selectedBundle.price;
        const coins = isCustom ? customCoins : selectedBundle.coins;
        document.getElementById('buyBtnText').textContent = `Buy for $${price}`;
        document.getElementById('buyBtn').disabled = coins < 30;
    }

    function handlePurchase() {
        const coins = isCustom ? customCoins : selectedBundle.coins;
        const link = isCustom ? STRIPE_LINKS.custom : STRIPE_LINKS[coins];
        const recipient = document.getElementById('recipient').value || '@self';
        
        if (!link || link.includes('xxx')) {
            alert('Replace STRIPE_LINKS in the code with your real Stripe Payment Links from dashboard.stripe.com/payment-links');
            return;
        }
        // Add recipient to
